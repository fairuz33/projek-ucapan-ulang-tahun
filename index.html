<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Latar belakang gelap */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 1s ease-in-out;
        }

        .active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Styling Hitung Mundur */
        #countdown {
            font-size: 8rem;
            color: #ff69b4; /* Warna pink */
            font-weight: bold;
        }

        /* Styling Ucapan */
        #greeting h1 {
            font-size: 3rem;
            margin: 0;
            color: #ff69b4;
        }
        #greeting h2 {
            font-size: 4rem;
            margin: 10px 0;
            color: #fff;
        }

        /* Styling GIF */
        #gif-section img {
            max-width: 80%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        /* Styling Galeri Foto */
        #gallery {
            padding: 20px;
            box-sizing: border-box;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }
        .photo-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ff69b4;
        }
    </style>
</head>
<body>

    <!-- Layar 1: Hitung Mundur -->
    <div id="screen-countdown" class="screen active">
        <div id="countdown">3</div>
    </div>

    <!-- Layar 2: Ucapan Selamat -->
    <div id="screen-greeting" class="screen">
        <h1>Happy Birthday</h1>
        <!-- GANTI NAMA DI BAWAH INI -->
        <h2>fairus</h2> 
    </div>

    <!-- Layar 3: GIF Lucu -->
    <div id="screen-gif" class="screen">
        <!-- GANTI URL GIF DI BAWAH INI DENGAN LINK GIF ANDA -->
        <img src="https://media.giphy.com/media/l4KibWpBGWchSqCRy/giphy.gif" alt="Funny Birthday GIF">
    </div>

    <!-- Layar 4: Galeri Foto -->
    <div id="screen-gallery" class="screen">
        <h2>Our Memories</h2>
        <div class="photo-grid">
            <!-- GANTI URL GAMBAR DI BAWAH INI DENGAN FOTO-FOTO ANDA -->
            <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=Foto+1" alt="Foto 1">
            <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=Foto+2" alt="Foto 2">
            <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=Foto+3" alt="Foto 3">
            <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=Foto+4" alt="Foto 4">
        </div>
    </div>

    <script>
        // Logika Hitung Mundur dan Transisi Layar
        let count = 3;
        const countdownElement = document.getElementById('countdown');
        const screenCountdown = document.getElementById('screen-countdown');
        const screenGreeting = document.getElementById('screen-greeting');
        const screenGif = document.getElementById('screen-gif');
        const screenGallery = document.getElementById('screen-gallery');

        // Fungsi untuk mengganti layar aktif
        function switchScreen(hideScreen, showScreen) {
            hideScreen.classList.remove('active');
            showScreen.classList.add('active');
        }

        // Timer hitung mundur
        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownElement.innerText = count;
            } else {
                clearInterval(countdownInterval);
                // Pindah ke layar Ucapan
                switchScreen(screenCountdown, screenGreeting);
                
                // Tunggu 3 detik, lalu pindah ke layar GIF
                setTimeout(() => {
                    switchScreen(screenGreeting, screenGif);
                    
                    // Tunggu 4 detik lagi, lalu pindah ke Galeri Foto
                    setTimeout(() => {
                        switchScreen(screenGif, screenGallery);
                    }, 4000); // Waktu tampil GIF
                    
                }, 3000); // Waktu tampil Ucapan
            }
        }, 1000); // Interval hitung mundur 1 detik
    </script>
</body>
</html>
